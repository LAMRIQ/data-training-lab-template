name: CI

# Le signal de réussite de l'apprenant : lint SQL + build/tests dbt au vert.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Lint SQL (sqlfluff)
        run: sqlfluff lint dbt/models --dialect duckdb

      - name: Ingestion
        run: python ingestion/load_raw.py

      - name: dbt build (run + tests)
        working-directory: dbt
        run: dbt build --profiles-dir .
