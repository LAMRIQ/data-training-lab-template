name: CI

# Le signal de réussite de l'apprenant : lint SQL + build/tests dbt + parsing du DAG, au vert.
# La CI réutilise les mêmes cibles `make` que le devcontainer → reproductibilité local/CI.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: CI pipeline (lint + ingestion + dbt build + DAG)
        run: make ci
